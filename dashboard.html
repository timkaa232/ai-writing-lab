<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Writing Lab — Тренажёр письма</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Шапка -->
        <div class="header">
            <h1>AI Writing Lab</h1>
            <div class="user-info">
                <span id="user-email">Пользователь</span>
                <button id="logout-btn" class="btn-outline">Выйти</button>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <!-- Левая панель: ввод текста -->
            <div class="writing-panel">
                <div class="goal-selector">
                    <label>Цель тренировки:</label>
                    <select id="goal-select">
                        <option value="business">Деловая переписка</option>
                        <option value="ielts">Эссе IELTS</option>
                        <option value="social">Пост в соцсетях</option>
                    </select>
                    <button id="generate-topic-btn" class="btn-secondary">Сгенерировать тему</button>
                </div>

                <div id="topic-box" class="topic-box">
                    <strong>Тема:</strong> <span id="topic-text">Нажмите "Сгенерировать тему"</span>
                </div>

                <textarea id="essay-input" placeholder="Введите ваш текст на английском языке..." rows="10"></textarea>

                <div class="action-buttons">
                    <button id="analyze-btn" class="btn-primary">Проверить текст</button>
                    <button id="sprint-btn" class="btn-secondary">Спринт 5 мин</button>
                    <span id="word-count">0 слов</span>
                </div>

                <div id="timer-display" class="timer"></div>
                <div id="status-message" class="status-message"></div>
            </div>

            <!-- Правая панель: результаты проверки -->
            <div class="feedback-panel">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="grammar">Грамматика</button>
                    <button class="tab-btn" data-tab="vocabulary">Лексика</button>
                    <button class="tab-btn" data-tab="style">Стиль</button>
                    <button class="tab-btn" data-tab="structure">Структура</button>
                </div>

                <div id="feedback-content" class="feedback-content">
                    <p class="placeholder">Результаты проверки появятся здесь</p>
                </div>
            </div>
        </div>

        <!-- История проверок -->
        <div class="history-section">
            <h2>История проверок</h2>
            <div id="history-list" class="history-list">
                <p class="placeholder">Загрузка истории...</p>
            </div>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        // Глобальные переменные
        let currentTopic = '';
        let timerInterval = null;
        let timerSeconds = 0;
        let lastFeedback = null;

        // Проверка авторизации
        async function checkUser() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('user-email').textContent = user.email;
                loadHistory();
            }
        }
        checkUser();

        // Выход
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await window.supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        });

        // Подсчёт слов
        document.getElementById('essay-input').addEventListener('input', (e) => {
            const words = e.target.value.trim().split(/\s+/).filter(w => w.length > 0);
            document.getElementById('word-count').textContent = words.length + ' слов';
        });

        // Генерация темы (без OpenAI, из готовых списков)
        document.getElementById('generate-topic-btn').addEventListener('click', () => {
            const goal = document.getElementById('goal-select').value;
            
            const topics = {
                business: [
                    'Write an email to a client explaining a delay in the project timeline.',
                    'Draft a formal complaint to a supplier about a defective shipment.',
                    'Write a memo to your team about the new remote work policy.',
                    'Compose a follow-up email after a business meeting.',
                    'Write a proposal for a new marketing campaign to your manager.',
                    'Draft a resignation letter with two weeks notice.',
                    'Write an email requesting a budget increase for your department.',
                    'Compose a thank-you note to a colleague who helped with a project.'
                ],
                ielts: [
                    'Some people believe that technology has made our lives more complex. To what extent do you agree or disagree?',
                    'Should governments invest more in public transportation than in roads? Discuss both views.',
                    'The best way to reduce crime is to give longer prison sentences. Do you agree?',
                    'In many countries, people are living longer. What problems does this cause? What solutions can you suggest?',
                    'Some people think that children should start school at a very early age. Others believe they should stay at home. Discuss both views.',
                    'Is it better to work for a large company or to be self-employed? Give reasons for your answer.',
                    'Many people believe that social media has a negative impact on personal relationships. Do you agree or disagree?',
                    'Should university education be free for everyone? Discuss the advantages and disadvantages.'
                ],
                social: [
                    'Write a LinkedIn post about a recent professional achievement.',
                    'Compose an Instagram caption for a travel photo.',
                    'Write a Twitter thread explaining a concept in your field of expertise.',
                    'Draft a Facebook post announcing a new product launch.',
                    'Write a Reddit post asking for advice about career change.',
                    'Compose a short motivational post for your personal blog.',
                    'Write a comment on a professional discussion about remote work trends.',
                    'Draft a Telegram announcement for your community channel.'
                ]
            };
            
            const list = topics[goal] || topics.business;
            const randomTopic = list[Math.floor(Math.random() * list.length)];
            
            currentTopic = randomTopic;
            document.getElementById('topic-text').textContent = randomTopic;
        });

        // Проверка текста AI (через сервер Vercel)
        async function analyzeEssay(essay, goal) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = 'Отправка текста на проверку...';
            statusEl.style.color = '#667eea';
            
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ essay, goal, topic: currentTopic })
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                statusEl.textContent = 'Ошибка: ' + (data.error || 'Неизвестная ошибка');
                statusEl.style.color = '#dc3545';
                throw new Error(data.error || 'Server error');
            }
            
            statusEl.textContent = 'Проверка завершена!';
            statusEl.style.color = '#28a745';
            setTimeout(() => { statusEl.textContent = ''; }, 3000);
            
            return data;
        }

        // Отображение результатов
        function displayFeedback(feedback) {
            lastFeedback = feedback;
            localStorage.setItem('lastFeedback', JSON.stringify(feedback));
            const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
            renderTabContent(activeTab, feedback);
        }

        function renderTabContent(tab, feedback) {
            const content = document.getElementById('feedback-content');
            
            // Защита от пустого ответа
            if (!feedback || feedback.error) {
                content.innerHTML = '<p class="placeholder">Ошибка при проверке. Попробуйте ещё раз.</p>';
                return;
            }
            
            // Создаём поля по умолчанию, если AI их не вернул
            const grammar = feedback.grammar || { score: 'N/A', errors: [] };
            const vocabulary = feedback.vocabulary || { score: 'N/A', suggestions: [], comment: '' };
            const style = feedback.style || { score: 'N/A', comment: '', tone: 'нейтральный' };
            const structure = feedback.structure || { score: 'N/A', comment: '' };
            
            let html = '';

            switch(tab) {
                case 'grammar':
                    html = `<h3>Грамматика (Оценка: ${grammar.score}/9)</h3>`;
                    if (grammar.errors && grammar.errors.length > 0) {
                        html += '<ul class="error-list">';
                        grammar.errors.forEach(e => {
                            html += `<li><span class="error-text">${e.text || ''}</span> → <span class="correction">${e.correction || ''}</span><br><small>${e.explanation || ''}</small></li>`;
                        });
                        html += '</ul>';
                    } else {
                        html += '<p>Ошибок не найдено!</p>';
                    }
                    break;
                case 'vocabulary':
                    html = `<h3>Лексика (Оценка: ${vocabulary.score}/9)</h3>`;
                    html += `<p>${vocabulary.comment || ''}</p>`;
                    if (vocabulary.suggestions && vocabulary.suggestions.length > 0) {
                        html += '<ul>';
                        vocabulary.suggestions.forEach(s => {
                            html += `<li><strong>${s.original || ''}</strong> → ${s.synonym || ''}</li>`;
                        });
                        html += '</ul>';
                    }
                    break;
                case 'style':
                    html = `<h3>Стиль (Оценка: ${style.score}/9)</h3>`;
                    html += `<p>Тон: ${style.tone || 'нейтральный'}</p>`;
                    html += `<p>${style.comment || ''}</p>`;
                    break;
                case 'structure':
                    html = `<h3>Структура (Оценка: ${structure.score}/9)</h3>`;
                    html += `<p>${structure.comment || ''}</p>`;
                    break;
            }

            content.innerHTML = html;
        }

        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (lastFeedback) {
                    renderTabContent(btn.dataset.tab, lastFeedback);
                }
            });
        });

        // Анализ текста
        document.getElementById('analyze-btn').addEventListener('click', async () => {
            const essay = document.getElementById('essay-input').value.trim();
            const goal = document.getElementById('goal-select').value;
            
            if (!essay) {
                alert('Введите текст для проверки');
                return;
            }
            
            if (essay.split(/\s+/).filter(w => w.length > 0).length < 5) {
                alert('Текст должен содержать минимум 5 слов');
                return;
            }

            const btn = document.getElementById('analyze-btn');
            btn.textContent = 'Проверка...';
            btn.disabled = true;

            try {
                const feedback = await analyzeEssay(essay, goal);
                
                // Проверяем, что ответ содержит нужные поля
                if (!feedback.grammar && !feedback.vocabulary && !feedback.style && !feedback.structure) {
                    throw new Error('AI response missing all fields');
                }
                
                displayFeedback(feedback);

                // Сохраняем в Supabase
                const { data: { user } } = await window.supabaseClient.auth.getUser();
                if (user) {
                    await window.supabaseClient.from('essays').insert({
                        user_id: user.id,
                        goal: goal,
                        topic: currentTopic,
                        content: essay,
                        feedback: feedback,
                        word_count: essay.split(/\s+/).filter(w => w.length > 0).length
                    });
                }

                loadHistory();
            } catch (error) {
                console.error('Ошибка анализа:', error);
                document.getElementById('feedback-content').innerHTML = '<p class="error">Ошибка проверки. Убедитесь, что на сервере настроен ключ OpenAI.</p>';
                document.getElementById('status-message').textContent = 'Ошибка: ' + error.message;
                document.getElementById('status-message').style.color = '#dc3545';
            }

            btn.textContent = 'Проверить текст';
            btn.disabled = false;
        });

        // Спринт 5 минут
        document.getElementById('sprint-btn').addEventListener('click', () => {
            const textarea = document.getElementById('essay-input');
            const btn = document.getElementById('sprint-btn');
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.textContent = 'Спринт 5 мин';
                document.getElementById('timer-display').textContent = '';
                textarea.disabled = false;
                return;
            }

            timerSeconds = 300;
            textarea.disabled = false;
            textarea.focus();
            
            timerInterval = setInterval(() => {
                timerSeconds--;
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                document.getElementById('timer-display').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    textarea.disabled = true;
                    btn.textContent = 'Спринт 5 мин';
                    document.getElementById('timer-display').textContent = 'Время вышло!';
                    document.getElementById('analyze-btn').click();
                }
            }, 1000);
            
            btn.textContent = 'Остановить спринт';
        });

        // Загрузка истории
        async function loadHistory() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) return;

            const { data, error } = await window.supabaseClient
                .from('essays')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false })
                .limit(10);

            const historyDiv = document.getElementById('history-list');
            
            if (error || !data || data.length === 0) {
                historyDiv.innerHTML = '<p class="placeholder">История пуста. Начните писать!</p>';
                return;
            }

            let html = '<table class="history-table"><tr><th>Дата</th><th>Цель</th><th>Тема</th><th>Слов</th></tr>';
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleString('ru-RU');
                const goalNames = { business: 'Бизнес', ielts: 'IELTS', social: 'Соцсети' };
                html += `<tr>
                    <td>${date}</td>
                    <td>${goalNames[item.goal] || item.goal}</td>
                    <td>${(item.topic || '').substring(0, 40)}...</td>
                    <td>${item.word_count || 0}</td>
                </tr>`;
            });
            html += '</table>';
            historyDiv.innerHTML = html;
        }
    </script>
</body>
</html>
